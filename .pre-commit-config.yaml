default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-yaml
        args: [--unsafe]
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: local
    hooks:
      # --- pre-commit: fast (<2s) ---
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --force-exclude
        language: system
        types: [python]
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format --force-exclude
        language: system
        types: [python]

      # --- pre-push: slower (~15s) ---
      - id: mypy
        name: mypy (pre-push)
        entry: uv run mypy src/sinan
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]
      - id: architecture-gates
        name: architecture & doc-consistency gates (pre-push)
        entry: uv run pytest tests/types/ -v
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]
